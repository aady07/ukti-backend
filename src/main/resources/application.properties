spring.application.name=education
spring.datasource.url=jdbc:postgresql://localhost:5432/ukti_db
spring.datasource.username=aady
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - update schema to add new columns (Cognito fields)
spring.jpa.hibernate.ddl-auto=update

# Cognito school pool (ap-south-1, user pool ap-south-1_XYqySdLwI)
ukti.cognito.jwks-url=https://cognito-idp.ap-south-1.amazonaws.com/ap-south-1_XYqySdLwI/.well-known/jwks.json

# D2C /try Cognito pool JWKS (paste when pool is created; empty falls back to school JWKS)
ukti.cognito.d2c.jwks-url=https://cognito-idp.ap-south-1.amazonaws.com/ap-south-1_x3mOA1hPM/.well-known/jwks.json

# Teacher JWT (HS256) - use a secure secret in production (min 32 chars)
ukti.teacher.jwt-secret=ukti-teacher-jwt-secret-change-in-production-min-32-chars

# Super admin backup emails (legacy Cognito path)
ukti.campaign.admin-emails=sadarsh510@gmail.com

# DB-only super admin (bootstrapped on startup — no Cognito)
ukti.super-admin.email=sadarsh510@gmail.com
ukti.super-admin.password=Mar#@!321
ukti.super-admin.jwt-secret=ukti-super-admin-jwt-secret-change-in-production-min-32
