spring.application.name=education
spring.datasource.url=jdbc:postgresql://localhost:5432/ukti_db
spring.datasource.username=aady
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - update schema to add new columns (Cognito fields)
spring.jpa.hibernate.ddl-auto=update

# Cognito (ap-south-1, user pool ap-south-1_XYqySdLwI)
ukti.cognito.jwks-url=https://cognito-idp.ap-south-1.amazonaws.com/ap-south-1_XYqySdLwI/.well-known/jwks.json

# Student activity captures (S3). Browser uploads via presigned PUT; progress metadata stores keys only.
# Leave enabled=false until bucket + IAM credentials are configured on the host (or ~/.aws/credentials).
ukti.media.enabled=false
ukti.media.bucket=
ukti.media.region=ap-south-1
ukti.media.key-prefix=activity-media
