# Profile "local": in-memory H2 — no Docker/Postgres required. Data is cleared when the JVM stops.
# Run: set SPRING_PROFILES_ACTIVE=local  (PowerShell: $env:SPRING_PROFILES_ACTIVE='local')
spring.application.name=education
spring.datasource.url=jdbc:h2:mem:uktidev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
ukti.cognito.jwks-url=https://cognito-idp.ap-south-1.amazonaws.com/ap-south-1_XYqySdLwI/.well-known/jwks.json
ukti.media.enabled=false
ukti.media.bucket=
ukti.media.region=ap-south-1
ukti.media.key-prefix=activity-media
