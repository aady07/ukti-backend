# =============================================================================
# Ukti Education Backend - educationuat.miraista.com -> port 8082
# =============================================================================
#
# SETUP (run on EC2):
# 1. SSL: sudo systemctl stop nginx && sudo certbot certonly --standalone -d educationuat.miraista.com && sudo systemctl start nginx
#    OR: copy educationuat-http-only.conf first, reload nginx, then: sudo certbot certonly --nginx -d educationuat.miraista.com
# 2. Copy: sudo cp education.conf /etc/nginx/conf.d/
# 3. Test: sudo nginx -t
# 4. Reload: sudo systemctl reload nginx
# 5. Deploy app: cd /home/ec2-user/Ukti/ukti-backend && ./deploy-ukti.sh
#
# DNS: Add A record educationuat.miraista.com -> EC2 public IP
# Security group: Allow 80, 443 inbound
# =============================================================================

server {
    listen 443 ssl;
    server_name educationuat.miraista.com;

    ssl_certificate     /etc/letsencrypt/live/educationuat.miraista.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/educationuat.miraista.com/privkey.pem;

    client_max_body_size 50M;

    # Ukti backend API (users, progress, etc.)
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name educationuat.miraista.com;
    return 301 https://$host$request_uri;
}
