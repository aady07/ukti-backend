# Temporary HTTP-only config for certbot --nginx
# Use this BEFORE running certbot, then replace with education.conf
server {
    listen 80;
    server_name educationuat.miraista.com;
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
